name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 12 * * 1,4'
  workflow_dispatch: 

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API
        run: |
          curl -X GET "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/leaderboard?limit=1" \
          -H "apikey: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}"